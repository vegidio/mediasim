name: Setup Build Tools
description: Install pnpm, Go, Wails, and go-task CLI

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Install Wails and go-task
      shell: bash
      run: |
        go install github.com/wailsapp/wails/v3/cmd/wails3@latest
        pnpm install -g @go-task/cli
