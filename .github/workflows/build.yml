name: build

on:
  push:
    tags:
      - '*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v5

      - name: Setup tools
        uses: ./.github/actions/setup-tools

      - name: Build binaries
        uses: ./.github/actions/replace-and-build
        with:
          version: ${{ github.ref_name }}
          otel-endpoint: ${{ secrets.OTEL_ENDPOINT }}
          otel-auth: ${{ secrets.OTEL_HEADER_AUTH }}
          oses: darwin
          archs: 'amd64 arm64'

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-macos
          path: build/*.zip

  build-linux:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Code checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Setup tools
        uses: ./.github/actions/setup-tools

      - name: Build binaries
        uses: ./.github/actions/replace-and-build
        with:
          version: ${{ github.ref_name }}
          otel-endpoint: ${{ secrets.OTEL_ENDPOINT }}
          otel-auth: ${{ secrets.OTEL_HEADER_AUTH }}
          oses: linux
          archs: ${{ matrix.arch }}

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-${{ matrix.arch }}
          path: build/*.zip

  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v5

      - name: Setup tools
        uses: ./.github/actions/setup-tools

      - name: Build binaries
        uses: ./.github/actions/replace-and-build
        with:
          version: ${{ github.ref_name }}
          otel-endpoint: ${{ secrets.OTEL_ENDPOINT }}
          otel-auth: ${{ secrets.OTEL_HEADER_AUTH }}
          oses: windows
          archs: amd64

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-windows-amd64
          path: build/*.zip

  build-windows-arm64:
    runs-on: windows-11-arm
    env:
      MSYS2_PATH_TYPE: inherit
      MSYSTEM: CLANGARM64
      CC: aarch64-w64-mingw32-gcc
      CXX: aarch64-w64-mingw32-g++
    steps:
      - name: Code checkout
        uses: actions/checkout@v5

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: |
            mingw-w64-clang-aarch64-gcc-compat

      - name: Setup tools
        uses: ./.github/actions/setup-tools

      - name: Build binaries
        uses: ./.github/actions/replace-and-build
        with:
          version: ${{ github.ref_name }}
          otel-endpoint: ${{ secrets.OTEL_ENDPOINT }}
          otel-auth: ${{ secrets.OTEL_HEADER_AUTH }}
          oses: windows
          archs: arm64
          shell: msys2 {0}

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-windows-arm64
          path: build/*.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, build-windows-amd64, build-windows-arm64]
    permissions:
      contents: write
    steps:
      # The `fetch-depth: 0` is important to fetch all the tags
      - name: Code checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch artifact
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Create the changelog
        run: |
          pnpm install -g release-it @release-it/conventional-changelog@10.0.1
          release-it --ci

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ github.ref_name }}
          tag: ${{ github.ref_name }}
          bodyFile: CHANGELOG.md
          replacesArtifacts: true
          artifacts: binaries/*.zip
